<script>
    // Tabulator Functions
    function dateFormatter(cell, formatterParams, onRendered) {
        var cellValue = cell.getValue();
        if (cellValue) {
            var date = new Date(cellValue);  // On transforme toujours en Date pour garantir que le tri fonctionne
            // Formater la date au format dd-MM-yyyy pour l'affichage
            return date.toLocaleDateString("fr-FR", {year: 'numeric', month: '2-digit', day: '2-digit'});
        }
        return "";
    }

    function statusFormatter(cell, formatterParams) {
        var value = cell.getValue();
        var translatedValue = getTranslationForPermitStatus(value, 'fr');

        var color = getColorForPermitStatus(value);

        // Retourne la valeur traduite du champ avec le style bold et la couleur
        return "<span style='font-weight: bold; color:" + color + ";'>" + translatedValue + "</span>";
    }

    function getColorForPermitStatus(status) {
        switch (status) {
            case 'appeal':
                return '#0b8db7'; // Couleur accessible (info avec plus de contraste)
            case 'referral':
                return '#004085'; // Couleur plus sombre entre info et primary pour plus de contraste
            case 'delivered':
                return '#0b6623'; // Succès, couleur verte foncée accessible
            case 'canceled':
                return '#212529'; // Dark, couleur par défaut avec bon contraste
            case 'suspended':
                return '#495057'; // Gris plus foncé pour contraste suffisant
            case 'instruction':
                return '#957105'; // Jaune foncé pour un bon contraste (warning)
            case 'refused':
                return '#a71d2a'; // Rouge foncé pour le danger, améliorant le contraste
            case 'undefined':
                return '#5a6268'; // Secondary, gris plus foncé pour plus de contraste
            default:
                return '#000000'; // Noir par défaut
        }
    }

    function getTranslationForPermitStatus(status, lang) {
        const translations = {
            'appeal': {fr: 'Recours', nl: 'Beroep'},
            'referral': {fr: 'Saisine', nl: 'Aanhangig'},
            'delivered': {fr: 'Octroyé', nl: 'Toegekend'},
            'canceled': {fr: 'Annulé', nl: 'Geannuleerd'},
            'suspended': {fr: 'Suspendu', nl: 'Opgeschort'},
            'instruction': {fr: 'Instruction', nl: 'Behandeling'},
            'refused': {fr: 'Refusé', nl: 'Geweigerd'},
            'undefined': {fr: 'Indéfini', nl: 'Ongedefinieerd'}
        };

        if (translations[status] && translations[status][lang]) {
            return translations[status][lang];
        } else {
            return status;
        }
    }

    let basePermitUrl = "/fr/_xxx";

// Fonction utilitaire pour déterminer la couleur du statut
function getPermitStatusColor(caseStatus, caseStatusFrenchName) {
    // Logique reproduite de PermitStatus::getStatus et ::getColor
    let status = 'UNDEFINED';

    if (caseStatus === "R") {
        status = 'APPEAL';
    } else if (caseStatusFrenchName === "Saisi par FD") {
        status = 'REFERRAL';
    } else if (caseStatusFrenchName === "Octroyé") {
        status = 'DELIVERED';
    } else if (caseStatusFrenchName === "Annulé") {
        status = 'CANCELED';
    } else if (caseStatus === "S") {
        status = 'SUSPENDED';
    } else if (caseStatus === "I") {
        status = 'INSTRUCTION';
    } else if (caseStatus === "V") {
        status = 'DELIVERED';
    } else if (caseStatus === "NV") {
        status = 'REFUSED';
    }

    return status;
}

function getColorFromStatus(status) {
    switch (status) {
        case 'APPEAL':
            return '#0dcaf0'; // Bootstrap info color
        case 'REFERRAL':
        case 'UNDEFINED':
            return '#0275d8'; // custom blue
        case 'DELIVERED':
            return '#198754'; // Bootstrap success color
        case 'CANCELED':
            return '#343a40'; // Bootstrap dark color
        case 'SUSPENDED':
            return '#6c757d'; // Bootstrap secondary/dark mix
        case 'INSTRUCTION':
            return '#ffc107'; // Bootstrap warning color (légèrement ajusté)
        case 'REFUSED':
            return '#dc3545'; // Bootstrap danger color
        default:
            return '#6c757d'; // Bootstrap secondary color (UNDEFINED)
    }
}

function calculateFloorDifference(properties, subtheme) {
    let base = subtheme;
    let authorized = parseFloat(properties[base + 'AuthorizedArea']) || 0;
    let existing = parseFloat(properties[base + 'ExistingArea']) || 0;
    let projected = parseFloat(properties[base + 'ProjectedArea']) || 0;

    if (properties[base + 'AuthorizedArea'] !== undefined && properties[base + 'AuthorizedArea'] !== null) {
        // Si Authorized est défini, on utilise Authorized - Existing
        return authorized - existing;
    } else if (properties[base + 'ProjectedArea'] !== undefined && properties[base + 'ProjectedArea'] !== null) {
        // Sinon, si Projected est défini, on utilise Projected - Existing
        return projected - existing;
    }
    return 0; // Aucune donnée significative
}
